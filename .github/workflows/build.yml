name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore dvbapi.net.sln
        continue-on-error: true

      - name: Build (Release x86)
        run: msbuild dvbapi.net.sln /p:Configuration=Release /p:Platform=x86 /t:dvbapiNet /v:minimal

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: dvbapiNet
          path: dvbapiNet/bin/x86/Release/dvbapiNet.dll
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dvbapiNet/bin/x86/Release/dvbapiNet.dll
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
